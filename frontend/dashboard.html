<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Taskify TMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Ambient glows -->
    <div class="ambient-glow-circle" style="top: 10%; left: 20%; width: 400px; height: 400px; background: var(--primary); opacity: 0.1;"></div>
    
    <div id="toast-container"></div>
    
    <div class="layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">Taskify</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a>
                <a href="tasks.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    Tasks
                </a>
                <a href="employees.html" id="nav-employees" style="display:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Employees
                </a>
                <a href="#" id="logout-btn" style="margin-top: auto; color: var(--danger);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content fade-in">
            <header class="topbar">
                <h2>Dashboard Overview</h2>
                <div class="user-profile">
                    <span id="current-user-name">Loading Profile...</span>
                </div>
            </header>
            
            <!-- Summary Stats -->
            <div class="summary-cards">
                <div class="card summary-card">
                    <h3>Total Tasks</h3>
                    <p class="stat" id="stat-total">0</p>
                </div>
                <div class="card summary-card success">
                    <h3>Completed</h3>
                    <p class="stat" id="stat-completed">0</p>
                </div>
                <div class="card summary-card warning">
                    <h3>In Progress</h3>
                    <p class="stat" id="stat-inprogress">0</p>
                </div>
                <div class="card summary-card pending">
                    <h3>Pending</h3>
                    <p class="stat" id="stat-pending">0</p>
                </div>
                <div class="card summary-card danger">
                    <h3>Overdue</h3>
                    <p class="stat" id="stat-overdue">0</p>
                </div>
            </div>
            
            <!-- Recent Activity Widget -->
            <div class="dashboard-widgets">
                <div class="card recent-tasks-widget">
                    <h3>Recent Tasks</h3>
                    <div id="recent-tasks-list">Loading Tasks...</div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
