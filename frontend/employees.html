<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees Directory - Taskify TMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Ambient glows -->
    <div class="ambient-glow-circle" style="top: 10%; right: 10%; width: 450px; height: 450px; background: var(--primary); opacity: 0.08;"></div>

    <div id="toast-container"></div>
    
    <div class="layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">Taskify</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a>
                <a href="tasks.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    Tasks
                </a>
                <a href="employees.html" class="active" id="nav-employees">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Employees
                </a>
                <a href="#" id="logout-btn" style="margin-top: auto; color: var(--danger);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </a>
            </nav>
        </aside>
        
        <!-- Main Content Area -->
        <main class="main-content fade-in">
            <header class="topbar">
                <h2>Employees Directory</h2>
                <button class="btn-primary" id="open-employee-modal" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Employee
                </button>
            </header>
            
            <!-- Employee List Table -->
            <div class="table-container card">
                <table id="employee-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employee-list">
                        <!-- Employee list rows will be injected dynamically -->
                        <tr>
                            <td colspan="6" style="text-align: center; color: var(--text-secondary); padding: 40px;">Loading employees directory...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal-overlay" id="employee-modal">
        <div class="modal slide-up">
            <div class="modal-header">
                <h3>Add New Employee</h3>
                <span class="close-btn" id="close-employee-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="employee-form">
                    <div class="form-group">
                        <label for="emp-name">Full Name</label>
                        <input type="text" id="emp-name" placeholder="e.g. Snehal Wani" required>
                    </div>
                    <div class="form-group">
                        <label for="emp-username">Username</label>
                        <input type="text" id="emp-username" placeholder="e.g. snehal_wani" required>
                    </div>
                    <div class="form-group">
                        <label for="emp-email">Email Address</label>
                        <input type="email" id="emp-email" placeholder="e.g. snehal@mponline.gov.in" required>
                    </div>
                    <div class="form-group">
                        <label for="emp-password">Default Password</label>
                        <input type="password" id="emp-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="emp-dept">Department</label>
                        <input type="text" id="emp-dept" placeholder="e.g. Engineering">
                    </div>
                    <div class="form-group">
                        <label for="emp-desig">Designation</label>
                        <input type="text" id="emp-desig" placeholder="e.g. Software Engineer Intern">
                    </div>
                    <button type="submit" class="btn-primary" id="save-employee-btn" style="width: 100%;">Create Account</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/employees.js"></script>
</body>
</html>
