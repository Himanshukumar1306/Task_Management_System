<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Taskify TMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="login-body">
    <!-- Ambient backgrounds -->
    <div class="ambient-glow-circle" style="top: 20%; left: 30%; width: 400px; height: 400px; background: var(--primary);"></div>
    <div class="ambient-glow-circle" style="bottom: 10%; right: 20%; width: 500px; height: 500px; background: var(--accent-purple);"></div>

    <div id="toast-container"></div>
    
    <div class="login-container fade-in">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access the Task Board</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="e.g. admin" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
            </form>
            <div style="margin-top: 24px; text-align: center;">
                <a href="index.html" style="font-size: 14px; display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary);">
                    ← Back to homepage
                </a>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
